plugins {
    id 'com.android.library'
    id 'maven-publish'
}
android {
    compileSdk 35
    namespace "com.peihua8858.roundview"
    defaultConfig {
        minSdk 21
        targetSdk 35
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles "consumer-rules.pro"
    }
    buildTypes {
        release {
            // 启用debug模式，控制Log打印
            debuggable false
            jniDebuggable false
            renderscriptDebuggable false
            renderscriptOptimLevel 3
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        // 开发版，正式服务器环境，Log打开，debug模式打开，混淆关闭
        release_display_log {
            // 启用debug模式，控制Log打印
            debuggable false
            jniDebuggable false
            renderscriptDebuggable false
            renderscriptOptimLevel 3
        }
        deploy {
            // 启用debug模式，控制Log打印
            debuggable true
            jniDebuggable false
            renderscriptDebuggable false
            renderscriptOptimLevel 3
        }
        // 开发版，正式服务器环境，Log打开，debug模式打开，混淆关闭
        develop {
            debuggable true
            jniDebuggable false
            renderscriptDebuggable false
            renderscriptOptimLevel 3
            ext.alwaysUpdateBuildId = false
        }
        // 开发版，正式服务器环境，Log打开，debug模式打开，混淆关闭
        developPay {
            debuggable true
            jniDebuggable false
            renderscriptDebuggable false
            renderscriptOptimLevel 3
            ext.alwaysUpdateBuildId = false
        }
        // 开发版，正式服务器环境，Log打开，debug模式打开，混淆关闭
        developTrack {
            debuggable true
            jniDebuggable false
            renderscriptDebuggable false
            renderscriptOptimLevel 3
            ext.alwaysUpdateBuildId = false
        }
        debug {
            debuggable true
            jniDebuggable false
            renderscriptDebuggable false
            renderscriptOptimLevel 3
            ext.alwaysUpdateBuildId = false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar"])
    implementation 'androidx.appcompat:appcompat:1.3.0'
    implementation 'com.github.peihua8858.ImageLoader:imageloader:1.0.8'
}
group = 'com.github.peihua8858'
afterEvaluate {
    publishing {
        publications {
            // Creates a Maven publication called "release".
            maven(MavenPublication) {
//                from components.release
                groupId = 'com.github.peihua8858.RoundedView'
                artifactId = 'api'
                version = '1.0.4'
                artifact bundleReleaseAar
            }
        }
    }
}
